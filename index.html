<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Activity Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Student Activity Tracker</h1>
      <p id="date"></p>
    </header>

    <section class="tracker">
      <div class="form-panel">
        <form id="form">
          <div class="form-group">
            <label for="name">Activity Name</label>
            <input type="text" id="name" placeholder="e.g., Data Structures Lab" required>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option>Academic</option>
              <option>Technical</option>
              <option>Personal</option>
              <option>Fitness</option>
            </select>
          </div>
          <div class="form-group">
            <label for="hours">Hours Spent</label>
            <input type="number" id="hours" placeholder="e.g., 1.5" step="0.5" required>
          </div>
          <button type="submit">Log Activity</button>
        </form>
      </div>

      <div class="display-panel">
        <div class="stats">
          <span>Total Hours:</span> <span id="total">0</span>
        </div>
        <div id="list" class="activity-list"></div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
